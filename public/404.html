<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 — Off the map · Nolvus PoE2 Filter Editor</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(1100px 640px at 50% -12%, rgba(255,107,74,0.10), transparent 62%),
        radial-gradient(820px 540px at 88% 8%, rgba(244,163,60,0.05), transparent 60%),
        #0F0E0D;
      color: #c7beb4;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .wrap { max-width: 540px; }
    .code {
      font-size: clamp(96px, 18vw, 168px); font-weight: 700; line-height: 1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ff6b4a, #f4a33c);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 8px 34px rgba(0,0,0,0.8));
    }
    .rule { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 14px 0 6px; }
    .rule span.line { height: 1px; width: 44px; background: #342d26; }
    .rule span.tag { color: #ff6b4a; font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase; }
    h1 { color: #f6f1ea; font-size: 22px; font-weight: 600; margin-top: 16px; }
    p { font-size: 14px; line-height: 1.6; margin-top: 12px; color: #b7b1a8; }
    a.btn {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 26px;
      text-decoration: none; font-weight: 600; font-size: 14px; color: #2b1208;
      padding: 11px 18px; border-radius: 4px;
      background: linear-gradient(135deg, #ff6b4a, #f4a33c);
      box-shadow: 0 6px 18px -7px rgba(255,107,74,0.7);
    }
    .foot { margin-top: 40px; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(183,177,168,0.35); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <div class="rule"><span class="line"></span><span class="tag">Off the map</span><span class="line"></span></div>
    <h1>You've wandered into the void, Exile.</h1>
    <p>Whatever you sought here has crumbled to dust — a page or relic that does not exist, or was never yours to take. The path ahead is sealed.</p>
    <a class="btn" href="/">⟵ Return to safety</a>
    <div class="foot">Nolvus · PoE2 Filter Editor</div>
  </main>
</body>
</html>

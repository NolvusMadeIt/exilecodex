<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome to ExileCodex</title>
  <style>
    :root { color-scheme: dark; --gold:#d7ae63; --gold-soft:#f1d99d; --ink:#090b10; --panel:rgba(13,16,22,.97); }
    * { box-sizing:border-box; }
    html, body { margin:0; width:100%; height:100%; overflow:hidden; font-family:Segoe UI,system-ui,sans-serif; color:#f6f2e9; }
    body { background:transparent; }
    #shade { position:fixed; inset:0; background:rgba(3,5,10,.70); }
    #spotlight { position:fixed; display:none; border:2px solid var(--gold); border-radius:12px; box-shadow:0 0 0 9999px rgba(3,5,10,.70), 0 0 28px rgba(215,174,99,.55); pointer-events:none; transition:all .18s ease; }
    #target-hit { position:fixed; display:none; padding:0; border:0; background:transparent; cursor:pointer; z-index:4; }
    #card { position:fixed; z-index:5; width:min(430px,calc(100vw - 36px)); padding:25px 27px 22px; border:1px solid rgba(215,174,99,.55); border-radius:14px; background:linear-gradient(145deg,rgba(25,29,39,.99),var(--panel)); box-shadow:0 20px 70px rgba(0,0,0,.55),0 0 32px rgba(215,174,99,.12); }
    #card.center { left:50%; top:50%; transform:translate(-50%,-50%); }
    #card.near { left:50%; top:54px; transform:translateX(-50%); }
    .eyebrow { color:var(--gold); text-transform:uppercase; letter-spacing:.16em; font-size:11px; font-weight:700; margin-bottom:9px; }
    h1 { margin:0 0 10px; font-size:25px; line-height:1.15; font-weight:650; }
    p { margin:0; color:#c7cbd4; font-size:14px; line-height:1.6; }
    .actions { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:21px; }
    button { font:inherit; }
    .primary { border:1px solid #e6c77f; border-radius:8px; padding:9px 16px; color:#17130b; background:linear-gradient(#f4d993,#c99d4e); font-weight:700; cursor:pointer; }
    .primary:hover { filter:brightness(1.08); }
    .skip { border:0; color:#aeb3be; background:transparent; cursor:pointer; font-size:12px; padding:8px 0; }
    .skip:hover { color:#fff; }
    #hint { color:#8e96a5; font-size:11px; }
    [hidden] { display:none !important; }
  </style>
</head>
<body>
  <div id="shade"></div>
  <div id="spotlight"></div>
  <button id="target-hit" aria-label="Continue the guided tour"></button>
  <section id="card" class="center" role="dialog" aria-modal="true" aria-labelledby="title">
    <div class="eyebrow" id="eyebrow">ExileCodex</div>
    <h1 id="title">Welcome</h1>
    <p id="body">Your companion tools are ready.</p>
    <div class="actions">
      <button class="skip" id="skip">Skip tour</button>
      <span id="hint">You can press Escape at any time.</span>
      <button class="primary" id="primary">Begin tour</button>
    </div>
  </section>
  <script>
    const copy = {
      welcome: { eyebrow:'Welcome to ExileCodex', title:'A better way to prepare for your next map', body:'This quick tour will show you where your tools live. It takes less than a minute and can be skipped at any time.', card:'center', button:'Begin tour', action:'begin' },
      market: { eyebrow:'First stop', title:'Start with Market Companion', body:'Market Companion opens first so you can check item values and trade context without leaving your session.', card:'near', button:'Continue', action:'market-next', target:'market' },
      orb: { eyebrow:'Your launcher', title:'Find the ExileCodex orb', body:'The orb stays on your desktop edge. Click it whenever you want to open the radial menu.', card:'near', target:'orb', targetAction:'open-menu' },
      menu: { eyebrow:'Your toolkit', title:'Everything is one click away', body:'The radial menu gives you quick access to your plugins and Settings. Select the Settings button to continue.', card:'near', target:'settings-button', targetAction:'open-settings' },
      settings: { eyebrow:'Make it yours', title:'Adjust ExileCodex in Settings', body:'Choose your theme, display mode, hotkeys, game paths, and plugin preferences here. When you are ready, finish the tour below.', card:'center', button:'Finish tour', action:'finish', target:'settings' },
    }
    let phase = 'welcome'
    let latestTargets = {}
    const $ = (id) => document.getElementById(id)
    function emit(action) { window.ecTutorial.action(action) }
    function render(state) {
      if (state && state.phase) phase = state.phase
      if (state && state.target && state.target.kind) latestTargets[state.target.kind] = state.target
      const spec = copy[phase] || copy.welcome
      $('eyebrow').textContent = spec.eyebrow
      $('title').textContent = spec.title
      $('body').textContent = spec.body
      $('card').className = spec.card
      $('primary').hidden = !spec.action
      $('primary').textContent = spec.button || ''
      $('hint').textContent = spec.target ? 'Select the highlighted control.' : 'You can press Escape at any time.'
      const target = spec.target && latestTargets[spec.target]
      const valid = target && target.width > 0 && target.height > 0
      $('shade').style.display = valid ? 'none' : 'block'
      $('spotlight').style.display = valid ? 'block' : 'none'
      $('target-hit').style.display = valid && spec.targetAction ? 'block' : 'none'
      if (valid) {
        const pad = 6
        const x = target.x - pad, y = target.y - pad, w = target.width + pad * 2, h = target.height + pad * 2
        for (const id of ['spotlight','target-hit']) { $(id).style.left=x+'px'; $(id).style.top=y+'px'; $(id).style.width=w+'px'; $(id).style.height=h+'px' }
      }
    }
    $('primary').addEventListener('click', () => { const spec = copy[phase]; if (spec && spec.action) emit(spec.action) })
    $('target-hit').addEventListener('click', () => { const spec = copy[phase]; if (spec && spec.targetAction) emit(spec.targetAction) })
    $('skip').addEventListener('click', () => emit('skip'))
    window.addEventListener('keydown', (event) => { if (event.key === 'Escape') { event.preventDefault(); emit('skip') } })
    window.ecTutorial.onState(render)
  </script>
</body>
</html>

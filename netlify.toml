# Netlify build & deploy config for Nolvus's Filter (Vite + React SPA).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 8 needs a modern Node. Netlify defaults can lag, so pin it.
  NODE_VERSION = "22"

# The app uses a hash router, so real requests only ever hit "/". This catch-all
# is a safety net so any deep path still serves the SPA instead of a 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

name: Release

# Builds the Windows installer and publishes it (with latest.yml) to THIS repo's
# GitHub Releases, so the in-app auto-updater can find it. exilecodex is public,
# so it is both the code home and the download/update home — one repo, and no
# personal-access-token secret to manage: electron-builder publishes with the
# built-in GITHUB_TOKEN (that's why the job needs `contents: write`).
#
# Trigger: push a version tag, e.g.
#     git tag v2.1.3-alpha && git push origin v2.1.3-alpha
# (package.json "version" must match the tag minus the leading "v").
# You can also run it manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer & publish to this repo's Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      # Keep the built installer as a workflow artifact too, so a build is never
      # lost even if a publish hiccups.
      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ExileCodex-Setup-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: warn

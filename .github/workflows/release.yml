name: Release

# Builds the Windows installer and publishes it (with latest.yml) to the PUBLIC releases repo
# so the in-app auto-updater can find it. The code repo stays private.
#
# Trigger: push a version tag, e.g.
#     git tag v0.11.2 && git push origin v0.11.2
# (make sure package.json "version" matches the tag, minus the leading "v").
# You can also run it manually from the Actions tab (workflow_dispatch).
#
# Requires a repo secret named RELEASES_TOKEN: a Personal Access Token with write access to
# NolvusMadeIt/nolvusfilter-releases (fine-grained: that repo + Contents: Read and write,
# or a classic token with the "repo" scope). electron-builder publishes using GH_TOKEN.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer (publishes when RELEASES_TOKEN is set)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning title=RELEASES_TOKEN missing::No RELEASES_TOKEN secret set on this repo, so the installer is built but NOT published to nolvusfilter-releases. Download it from this run's Artifacts. Add the secret (a PAT with write access to nolvusfilter-releases) to enable auto-publish + in-app updates."
            npx electron-builder --win --publish never
          else
            npx electron-builder --win --publish always
          fi

      # Always keep the built installer, even when publish is skipped or fails —
      # so a build is never lost and can be hand-uploaded / tested.
      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ExileCodex-Setup-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: warn

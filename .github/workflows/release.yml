name: Release

# A version tag is the only publication trigger. Electron Builder produces the
# installer/update files; GitHub CLI then creates one release containing all of
# them, avoiding concurrent publishers racing to create duplicate releases.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version tag and unused release
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ($env:RELEASE_TAG -ne "v$version") {
            throw "Tag $env:RELEASE_TAG does not match package version $version."
          }

          $releases = gh api "repos/$env:GITHUB_REPOSITORY/releases?per_page=100" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw 'Could not inspect existing releases.' }
          $matches = @($releases | Where-Object { $_.tag_name -eq $env:RELEASE_TAG })
          if ($matches.Count -ne 0) {
            throw "Release $env:RELEASE_TAG already exists; refusing to create another record."
          }

      - name: Test
        run: npm test

      - name: Build installer and updater artifacts
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Validate release artifacts
        shell: pwsh
        run: |
          # dist/ is versioned for provenance and may contain older releases.
          # Validate only the artifacts produced for this tag.
          $version = node -p "require('./package.json').version"
          $installer = @(Get-Item -LiteralPath "dist/ExileCodex-Setup-$version.exe")
          $blockmap = @(Get-Item -LiteralPath "dist/ExileCodex-Setup-$version.exe.blockmap")
          $latest = @(Get-ChildItem -LiteralPath dist -File -Filter 'latest.yml')

          if ($installer.Count -ne 1) { throw "Expected one installer, found $($installer.Count)." }
          if ($blockmap.Count -ne 1) { throw "Expected one blockmap, found $($blockmap.Count)." }
          if ($latest.Count -ne 1) { throw "Expected one latest.yml, found $($latest.Count)." }

          "INSTALLER_PATH=$($installer[0].FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "INSTALLER_NAME=$($installer[0].Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BLOCKMAP_PATH=$($blockmap[0].FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BLOCKMAP_NAME=$($blockmap[0].Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LATEST_PATH=$($latest[0].FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LATEST_NAME=$($latest[0].Name)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create one complete GitHub prerelease
        shell: pwsh
        run: |
          $notes = @(
            '## Windows installer'
            ''
            "Download **$env:INSTALLER_NAME** to install ExileCodex."
            ''
            "**$env:BLOCKMAP_NAME** and **$env:LATEST_NAME** are updater metadata used by installed copies of ExileCodex; they are not installers."
          ) -join [Environment]::NewLine

          gh release create $env:RELEASE_TAG $env:INSTALLER_PATH $env:BLOCKMAP_PATH $env:LATEST_PATH --verify-tag --title "ExileCodex $env:RELEASE_TAG" --prerelease --notes $notes
          if ($LASTEXITCODE -ne 0) { throw 'GitHub release creation failed.' }

      - name: Verify the public release and downloads
        shell: pwsh
        run: |
          $releases = gh api "repos/$env:GITHUB_REPOSITORY/releases?per_page=100" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw 'Could not inspect the published release.' }
          $matches = @($releases | Where-Object { $_.tag_name -eq $env:RELEASE_TAG })
          if ($matches.Count -ne 1) {
            throw "Expected one release record for $env:RELEASE_TAG, found $($matches.Count)."
          }

          $release = $matches[0]
          if ($release.prerelease -ne $true) { throw 'The alpha release was not marked as a prerelease.' }

          $expectedNames = @($env:INSTALLER_NAME, $env:BLOCKMAP_NAME, $env:LATEST_NAME)
          $actualNames = @($release.assets | ForEach-Object { $_.name })
          if ($actualNames.Count -ne 3) { throw "Expected three release assets, found $($actualNames.Count)." }
          foreach ($name in $expectedNames) {
            if ($name -notin $actualNames) { throw "Missing release asset: $name" }
          }

          foreach ($asset in @($release.assets)) {
            $response = $null
            for ($attempt = 1; $attempt -le 12; $attempt++) {
              try {
                $candidate = Invoke-WebRequest -Uri $asset.browser_download_url -Method Head -MaximumRedirection 10
                if ($candidate.StatusCode -eq 200) {
                  $response = $candidate
                  break
                }
              } catch {
                Write-Host "Attempt $attempt for $($asset.name) is not ready yet."
              }
              Start-Sleep -Seconds 5
            }
            if ($null -eq $response -or $response.StatusCode -ne 200) {
              throw "Public download did not become available: $($asset.browser_download_url)"
            }
          }

      - name: Retain complete release artifact set
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ExileCodex-Setup-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error
